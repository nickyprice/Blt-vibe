name: flutter_blt_vibe
description: BLT Vibe - Live Streaming for Radio DJs. A mobile streaming client for Shoutcast and Icecast servers.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # State management
  provider: ^6.1.2
  # HTTP requests (metadata updates)
  http: ^1.2.0
  # Persistent settings storage
  shared_preferences: ^2.2.2
  # Microphone permissions
  permission_handler: ^11.3.1
  # Audio recording and amplitude monitoring
  record: ^5.1.2
  # File system paths
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
